name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  yubisign:
    name: yubisign (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PC/SC headers
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt -p yubisign --check

      - name: Clippy
        run: cargo clippy -p yubisign --all-targets

      - name: Test
        run: cargo test -p yubisign
